<!-- Confirm Repair Modal -->
<div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal">
            <div class="modal-top text-center">
                <h4 class="mb-1 fw-bold">ยืนยันส่งข้อมูลใช่ไหม?</h4>
                <p class="mb-0 text-light">โปรดตรวจสอบข้อมูลก่อนส่ง</p>
            </div>
            <div class="modal-bottom">
                <div class="confirm-data-row mt-3"><div class="icon-circle me-2"><i class="fa-solid fa-user"></i></div><span x-text="formData.fullName"></span></div>
                <div class="confirm-data-row"><div class="icon-circle me-2"><i class="fa-solid fa-phone"></i></div><span x-text="formData.phoneNumber"></span></div>
                <div class="confirm-data-row"><div class="icon-circle me-2 align-self-start mt-1"><i class="fa-solid fa-location-dot"></i></div><span x-text="getFullAddress()"></span></div>
                <div class="confirm-data-row"><div class="icon-circle me-2"><i class="fa-solid fa-laptop"></i></div><span x-text="formData.deviceType"></span></div>
                <div class="confirm-data-row"><div class="icon-circle me-2"><i class="fa-solid fa-circle-question"></i></div><span x-text="formData.problemType"></span></div>
                <div class="confirm-data-row"><div class="icon-circle me-2"><i class="fa-regular fa-calendar"></i></div><span>วันนัดรับ: <span x-text="formData.pickupDate"></span></span></div>
                <div class="confirm-data-row"><div class="icon-circle me-2"><i class="fa-regular fa-clock"></i></div><span>เวลา: <span x-text="formData.pickupTime"></span></span></div>

                <div class="d-flex justify-content-center gap-4 mt-4" style="margin-left: 0;">
                    <button type="button" class="btn btn-cancel rounded-pill px-4" data-bs-dismiss="modal">แก้ไขข้อมูล</button>
                    <button type="button" class="btn btn-confirm rounded-pill px-4" @click="submitRepair" :disabled="submitting">
                        <span x-show="!submitting">ยืนยัน</span>
                        <span x-show="submitting" class="spinner-border spinner-border-sm"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Customer Quotation Modal -->
<div class="modal fade" id="customerQuotationModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal">
            <div class="modal-top text-center" style="background: #001f3f;">
                <h4 class="mb-0 fw-bold text-white">ใบเสนอราคา</h4>
            </div>
            <div class="modal-bottom p-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="badge rounded-pill px-3 py-2" style="background: #001f3f;">
                        <i class="fa-solid fa-file-lines me-1"></i> คิวงาน : <span x-text="repairData.queueId"></span>
                    </span>
                    <span class="text-muted small">25/01/2026</span>
                </div>

                <div class="mb-3">
                    <div class="small text-muted mb-1">อุปกรณ์: <span class="text-dark fw-bold" x-text="repairData.deviceType"></span></div>
                    <div class="small text-muted">อาการเสีย: <span class="text-dark" x-text="repairData.problemDetail"></span></div>
                </div>

                <div class="quotation-items mb-3">
                    <h6 class="fw-bold mb-2">รายการซ่อม / ค่าใช้จ่าย</h6>
                    <div class="table-responsive">
                        <table class="table table-sm small">
                            <thead class="table-light">
                                <tr>
                                    <th>รายการ</th>
                                    <th class="text-center">จำนวน</th>
                                    <th class="text-end">รวม</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="item in quotationData?.items || []" :key="item.id">
                                    <tr>
                                        <td x-text="item.productName"></td>
                                        <td class="text-center" x-text="item.quantity"></td>
                                        <td class="text-end" x-text="(item.quantity * item.price).toLocaleString()"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                    <div class="d-flex justify-content-end">
                        <div class="bg-dark text-white px-4 py-2 rounded-pill d-flex align-items-baseline gap-3">
                            <span class="small">ยอดสุทธิ</span>
                            <span class="fs-4 fw-bold" x-text="(quotationData?.totalPrice || 0).toLocaleString()"></span>
                            <span class="small">บาท</span>
                        </div>
                    </div>
                </div>

                <div class="technician-note p-2 bg-light rounded mb-4" style="border-left: 4px solid #0044cc;">
                    <div class="small fw-bold text-primary mb-1">หมายเหตุจากช่าง:</div>
                    <div class="small text-muted" x-text="quotationData?.technicianNote || 'ไม่มีหมายเหตุ'"></div>
                </div>

                <div class="d-flex justify-content-center gap-2">
                    <button class="btn btn-outline-secondary rounded-pill px-4 btn-sm" @click="cancelRepair()">ยกเลิกการซ่อม</button>
                    <button class="btn btn-primary rounded-pill px-4 btn-sm" style="background: #0044cc;" @click="confirmRepair()">ยืนยันการซ่อม</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Customer Payment Modal -->
<div class="modal fade" id="customerPaymentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal">
            <div class="modal-top text-center" style="background: #001f3f;">
                <h4 class="mb-0 fw-bold text-white">ชำระเงิน</h4>
            </div>
            <div class="modal-bottom p-4 text-center">
                <!-- Show QR if status is QUOTED (Waiting for customer to pay) -->
                <template x-if="repairData.status === 'QUOTED'">
                    <div>
                        <h5 class="mb-3">สแกนเพื่อชำระเงิน</h5>
                        <!-- Updated PromptPay Number: 0659535351 -->
                        <img :src="'https://promptpay.io/0659535351/' + (quotationData?.totalPrice || 0) + '.png'" class="img-fluid border p-2 mb-3" style="max-width: 200px;">
                        <div class="fw-bold fs-4 text-primary mb-2" x-text="(quotationData?.totalPrice || 0).toLocaleString() + ' บาท'"></div>
                        <p class="small text-muted mb-4">กรุณาแนบหลักฐานการโอนเงิน (ถ้ามี)<br>หรือระบบจะตรวจสอบอัตโนมัติภายใน 5-10 นาที</p>
                        
                        <!-- Test Button -->
                        <button class="btn btn-success w-100 rounded-pill mb-2" @click="simulatePaymentSuccess()">
                            <i class="fa-solid fa-vial me-2"></i> ทดสอบ: จ่ายเงินสำเร็จ
                        </button>
                    </div>
                </template>

                <!-- Show Success if status is PAID or later -->
                <template x-if="['PAID', 'REPAIRING', 'REPAIRED', 'DELIVERING', 'COMPLETED'].includes(repairData.status)">
                    <div class="py-4">
                        <div class="text-success mb-3" style="font-size: 4rem;">
                            <i class="fa-solid fa-circle-check"></i>
                        </div>
                        <h4 class="fw-bold text-success mb-2">ชำระเงินเรียบร้อย</h4>
                        <p class="text-muted">ขอบคุณที่ใช้บริการครับ ช่างจะเริ่มดำเนินการทันที</p>
                        <button class="btn btn-outline-secondary rounded-pill mt-3 px-4" data-bs-dismiss="modal">ปิด</button>
                    </div>
                </template>
            </div>
        </div>
    </div>
</div>

<!-- Confirm Return Modal -->
<div class="modal fade" id="confirmReturnModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal">
            <div class="modal-top text-center">
                <h4 class="mb-1 fw-bold">ยืนยันการรับเครื่องคืน</h4>
            </div>
            <div class="modal-bottom pt-3">
                <div class="confirm-data-row"><div class="icon-circle me-2"><i class="fa-solid fa-user"></i></div><span x-text="returnForm.fullName"></span></div>
                <div class="confirm-data-row"><div class="icon-circle me-2"><i class="fa-solid fa-calendar"></i></div><span>นัดรับวันที่: <span x-text="returnForm.date"></span></span></div>
                <div class="confirm-data-row"><div class="icon-circle me-2"><i class="fa-solid fa-clock"></i></div><span>ช่วงเวลา: <span x-text="returnForm.time"></span></span></div>
                
                <div class="d-flex justify-content-center gap-4 mt-4" style="margin-left: 0;">
                    <button type="button" class="btn btn-cancel rounded-pill px-4" data-bs-dismiss="modal">แก้ไข</button>
                    <button type="button" class="btn btn-confirm rounded-pill px-4" @click="submitReturn">ยืนยัน</button>
                </div>
            </div>
        </div>
    </div>
</div>
