<template x-if="view === 'profile'">
    <div class="content-wrapper" style="padding: 2rem 3rem; overflow-y: auto; background: #f8fafc; display: flex; flex-direction: column;">
        <!-- Header Section (Top) -->
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 2.5rem;">
            <div style="background: #f1f5f9; padding: 10px; border-radius: 15px; font-size: 1.5rem;">⚙️</div>
            <h2 style="font-size: 2.2rem; font-weight: 800; color: #001f3f; margin: 0;">ตั้งค่าโปรไฟล์</h2>
        </div>

        <!-- Main Grid Container -->
        <div style="max-width: 1300px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; align-items: start;">
            
            <!-- Left Column: Profile Info -->
            <div style="background: white; border-radius: 35px; padding: 2.5rem; box-shadow: 0 15px 40px rgba(0,0,0,0.03); border: 1px solid #f1f5f9;">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem;">
                    <h3 style="color: #001f3f; font-weight: 800; font-size: 1.4rem; margin: 0; display: flex; align-items: center; gap: 12px;">
                        <i class="fa-solid fa-id-card" style="color: #3b82f6;"></i> ข้อมูลส่วนตัว
                    </h3>
                </div>
                
                <div x-data="{ 
                    profileForm: { 
                        email: user?.email || '', 
                        displayName: user?.displayName || '', 
                        firstName: user?.firstName || '', 
                        lastName: user?.lastName || '', 
                        phoneNumber: user?.phoneNumber || '' 
                    } 
                }" x-init="$watch('user', v => { if(v) profileForm = { ...v } })">
                    
                    <div class="form-group" style="margin-bottom: 1.2rem;">
                        <label style="display: block; font-weight: 700; color: #475569; margin-bottom: 8px; font-size: 0.9rem;">ชื่อที่แสดงในระบบ (Display Name) :</label>
                        <div style="position: relative;">
                            <span style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8;"><i class="fa-solid fa-signature"></i></span>
                            <input type="text" x-model="profileForm.displayName" placeholder="เช่น ช่างกาย"
                                   style="width: 100%; padding: 12px 15px 12px 45px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 1rem;">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 1.2rem;">
                        <div class="form-group">
                            <label style="display: block; font-weight: 700; color: #475569; margin-bottom: 8px; font-size: 0.9rem;">ชื่อจริง :</label>
                            <input type="text" x-model="profileForm.firstName"
                                   style="width: 100%; padding: 12px 15px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 1rem;">
                        </div>
                        <div class="form-group">
                            <label style="display: block; font-weight: 700; color: #475569; margin-bottom: 8px; font-size: 0.9rem;">นามสกุล :</label>
                            <input type="text" x-model="profileForm.lastName"
                                   style="width: 100%; padding: 12px 15px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 1rem;">
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 1.2rem;">
                        <label style="display: block; font-weight: 700; color: #475569; margin-bottom: 8px; font-size: 0.9rem;">อีเมลที่ใช้ล็อกอิน :</label>
                        <div style="position: relative;">
                            <span style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8;"><i class="fa-solid fa-envelope"></i></span>
                            <input type="email" x-model="profileForm.email"
                                   style="width: 100%; padding: 12px 15px 12px 45px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 1rem;">
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label style="display: block; font-weight: 700; color: #475569; margin-bottom: 8px; font-size: 0.9rem;">เบอร์โทรศัพท์ติดต่อ :</label>
                        <div style="position: relative;">
                            <span style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8;"><i class="fa-solid fa-phone"></i></span>
                            <input type="text" x-model="profileForm.phoneNumber"
                                   style="width: 100%; padding: 12px 15px 12px 45px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 1rem;">
                        </div>
                    </div>

                    <button @click="updateProfile(profileForm)" class="btn-hover-effect"
                            style="width: 100%; padding: 15px; border-radius: 15px; background: #001f3f; color: white; border: none; font-weight: 800; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                        <i class="fa-solid fa-floppy-disk"></i> บันทึกการเปลี่ยนแปลง
                    </button>
                </div>
            </div>

            <!-- Right Column: Password Change -->
            <div style="background: white; border-radius: 35px; padding: 2.5rem; box-shadow: 0 15px 40px rgba(0,0,0,0.03); border: 1px solid #f1f5f9;">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem;">
                    <h3 style="color: #001f3f; font-weight: 800; font-size: 1.4rem; margin: 0; display: flex; align-items: center; gap: 12px;">
                        <i class="fa-solid fa-shield-halved" style="color: #ef4444;"></i> ความปลอดภัย
                    </h3>
                </div>

                <div x-data="{ 
                    pwdForm: { oldPassword: '', newPassword: '', confirmPassword: '' } 
                }">
                    <div class="form-group" style="margin-bottom: 1.2rem;">
                        <label style="display: block; font-weight: 700; color: #475569; margin-bottom: 8px; font-size: 0.9rem;">รหัสผ่านปัจจุบัน :</label>
                        <input type="password" x-model="pwdForm.oldPassword" placeholder="••••••••" 
                               style="width: 100%; padding: 12px 15px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 1rem;">
                    </div>

                    <div style="width: 100%; height: 1px; background: #f1f5f9; margin: 1.5rem 0;"></div>

                    <div class="form-group" style="margin-bottom: 1.2rem;">
                        <label style="display: block; font-weight: 700; color: #475569; margin-bottom: 8px; font-size: 0.9rem;">รหัสผ่านใหม่ :</label>
                        <input type="password" x-model="pwdForm.newPassword" placeholder="••••••••" 
                               style="width: 100%; padding: 12px 15px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 1rem;">
                    </div>

                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label style="display: block; font-weight: 700; color: #475569; margin-bottom: 8px; font-size: 0.9rem;">ยืนยันรหัสผ่านใหม่ :</label>
                        <input type="password" x-model="pwdForm.confirmPassword" placeholder="••••••••" 
                               style="width: 100%; padding: 12px 15px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 1rem;">
                    </div>

                    <button @click="if(pwdForm.newPassword !== pwdForm.confirmPassword) { Swal.fire('ผิดพลาด', 'รหัสผ่านใหม่ไม่ตรงกัน', 'error'); return; } changePassword(pwdForm)"
                            class="btn-hover-effect-danger"
                            style="width: 100%; padding: 15px; border-radius: 15px; background: #ef4444; color: white; border: none; font-weight: 800; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                        <i class="fa-solid fa-key"></i> อัปเดตรหัสผ่าน
                    </button>
                </div>
            </div>
        </div>
    </div>
</template>

<style>
.btn-hover-effect:hover {
    background: #001122 !important;
    transform: translateY(-2px);
    box-shadow: 0 8px 15px rgba(0,31,63,0.1);
}
.btn-hover-effect-danger:hover {
    background: #dc2626 !important;
    transform: translateY(-2px);
    box-shadow: 0 8px 15px rgba(239,68,68,0.1);
}
input:focus {
    outline: none !important;
    border-color: #3b82f6 !important;
    background: white !important;
    box-shadow: 0 0 0 4px rgba(59,130,246,0.05) !important;
}
</style>
