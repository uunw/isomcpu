<template x-if="view === 'tech-manage'">
    <div class="content-wrapper" style="padding: 2rem 3rem; overflow-y: auto; background: #f8fafc; display: flex; flex-direction: column;">
        <!-- Header Section (Top) -->
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 2.5rem;">
            <div style="background: #f1f5f9; padding: 10px; border-radius: 15px; font-size: 1.5rem;">👨‍🔧</div>
            <h2 style="font-size: 2.2rem; font-weight: 800; color: #001f3f; margin: 0;">จัดการทีมช่าง</h2>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; align-items: start; max-width: 1400px;">
            <!-- Left Column: Add New Tech Form -->
            <div style="background: white; border-radius: 35px; padding: 2.5rem; box-shadow: 0 15px 40px rgba(0,0,0,0.03); border: 1px solid #f1f5f9;">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem;">
                    <h3 style="color: #001f3f; font-weight: 800; font-size: 1.4rem; margin: 0; display: flex; align-items: center; gap: 12px;">
                        <i class="fa-solid fa-user-plus" style="color: #3b82f6;"></i> เพิ่มช่างคนใหม่
                    </h3>
                </div>
                
                <form x-data="{ form: { email: '', password: '', displayName: '', firstName: '', lastName: '', phoneNumber: '' } }" 
                      @submit.prevent="registerNewTech(form)">
                    
                    <div class="form-group" style="margin-bottom: 1.2rem;">
                        <label style="display: block; font-weight: 700; color: #475569; margin-bottom: 8px; font-size: 0.9rem;">อีเมลสำหรับเข้าสู่ระบบ :</label>
                        <div style="position: relative;">
                            <span style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8;"><i class="fa-solid fa-envelope"></i></span>
                            <input type="email" x-model="form.email" required placeholder="example@email.com"
                                   style="width: 100%; padding: 12px 15px 12px 45px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 1rem;">
                        </div>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 1.2rem;">
                        <label style="display: block; font-weight: 700; color: #475569; margin-bottom: 8px; font-size: 0.9rem;">รหัสผ่านเริ่มต้น :</label>
                        <div style="position: relative;">
                            <span style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8;"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" x-model="form.password" required placeholder="••••••••"
                                   style="width: 100%; padding: 12px 15px 12px 45px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 1rem;">
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 1.2rem;">
                        <label style="display: block; font-weight: 700; color: #475569; margin-bottom: 8px; font-size: 0.9rem;">ชื่อที่แสดง (Display Name) :</label>
                        <div style="position: relative;">
                            <span style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8;"><i class="fa-solid fa-signature"></i></span>
                            <input type="text" x-model="form.displayName" required placeholder="ช่าง..."
                                   style="width: 100%; padding: 12px 15px 12px 45px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 1rem;">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 1.2rem;">
                        <div class="form-group">
                            <label style="display: block; font-weight: 700; color: #475569; margin-bottom: 8px; font-size: 0.9rem;">ชื่อจริง :</label>
                            <input type="text" x-model="form.firstName" required
                                   style="width: 100%; padding: 12px 15px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 1rem;">
                        </div>
                        <div class="form-group">
                            <label style="display: block; font-weight: 700; color: #475569; margin-bottom: 8px; font-size: 0.9rem;">นามสกุล :</label>
                            <input type="text" x-model="form.lastName" required
                                   style="width: 100%; padding: 12px 15px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 1rem;">
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label style="display: block; font-weight: 700; color: #475569; margin-bottom: 8px; font-size: 0.9rem;">เบอร์โทรศัพท์ :</label>
                        <div style="position: relative;">
                            <span style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8;"><i class="fa-solid fa-phone"></i></span>
                            <input type="text" x-model="form.phoneNumber" required placeholder="0XX-XXX-XXXX"
                                   style="width: 100%; padding: 12px 15px 12px 45px; border-radius: 12px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 1rem;">
                        </div>
                    </div>

                    <button type="submit" class="btn-hover-effect"
                            style="width: 100%; padding: 15px; border-radius: 15px; background: #001f3f; color: white; border: none; font-weight: 800; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                        <i class="fa-solid fa-user-check"></i> ลงทะเบียนช่างคนใหม่
                    </button>
                </form>
            </div>

            <!-- Right Column: Technician List -->
            <div style="background: white; border-radius: 35px; padding: 2.5rem; box-shadow: 0 15px 40px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; display: flex; flex-direction: column;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h3 style="color: #001f3f; font-weight: 800; font-size: 1.4rem; margin: 0; display: flex; align-items: center; gap: 12px;">
                        <i class="fa-solid fa-users-gear" style="color: #10b981;"></i> รายชื่อช่างในระบบ
                    </h3>
                    <span style="background: #ecfdf5; color: #10b981; padding: 6px 15px; border-radius: 12px; font-size: 0.85rem; font-weight: bold;" x-text="allTechnicians.length + ' คน'"></span>
                </div>

                <div style="flex: 1; overflow-y: auto;">
                    <table style="width: 100%; border-collapse: separate; border-spacing: 0 10px;">
                        <thead>
                            <tr style="text-align: left; color: #94a3b8; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">
                                <th style="padding: 10px;">ช่างซ่อม</th>
                                <th style="padding: 10px;">ข้อมูลติดต่อ</th>
                                <th style="padding: 10px; text-align: center;">สถานะ</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="t in allTechnicians" :key="t.id">
                                <tr style="background: #f8fafc; transition: 0.2s;" class="tech-row-hover">
                                    <td style="padding: 15px; border-radius: 15px 0 0 15px;">
                                        <div style="display: flex; align-items: center; gap: 12px;">
                                            <div style="width: 40px; height: 40px; border-radius: 12px; overflow: hidden; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                                                <img :src="t.profileImage || '/tech-assets/img/profile_kai.png'" style="width: 100%; height: 100%; object-fit: cover;">
                                            </div>
                                            <div>
                                                <div style="font-weight: 700; color: #1e293b;" x-text="t.displayName"></div>
                                                <div style="font-size: 0.75rem; color: #64748b;" x-text="t.firstName + ' ' + t.lastName"></div>
                                            </div>
                                        </div>
                                    </td>
                                    <td style="padding: 15px;">
                                        <div style="font-size: 0.85rem; color: #475569; display: flex; flex-direction: column; gap: 2px;">
                                            <span><i class="fa-solid fa-envelope me-2" style="font-size: 0.7rem; opacity: 0.5;"></i> <span x-text="t.email"></span></span>
                                            <span><i class="fa-solid fa-phone me-2" style="font-size: 0.7rem; opacity: 0.5;"></i> <span x-text="t.phoneNumber"></span></span>
                                        </div>
                                    </td>
                                    <td style="padding: 15px; text-align: center; border-radius: 0 15px 15px 0;">
                                        <span style="background: #d1fae5; color: #059669; padding: 5px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 800;">ACTIVE</span>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                    
                    <template x-if="allTechnicians.length === 0">
                        <div style="text-align: center; padding: 4rem; color: #cbd5e1;">
                            <i class="fa-solid fa-user-slash" style="font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.3;"></i>
                            <p style="font-size: 1.1rem; font-weight: 500;">ไม่พบข้อมูลช่างในระบบ</p>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</template>

<style>
.tech-row-hover:hover {
    background: #f1f5f9 !important;
    transform: scale(1.01);
}
</style>
