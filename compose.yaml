services:
  api:
    build: .
    container_name: isomcom-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# หากในอนาคตต้องการรันฐานข้อมูล PostgreSQL ไว้ในเครื่องเอง 
# สามารถเพิ่ม service 'db' และเชื่อมต่อกันผ่าน network ได้ที่นี่ครับ
